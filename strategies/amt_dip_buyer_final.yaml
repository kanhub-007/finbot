# AMT Dip Buyer v1 — Auction Market Theory Rule 1 Mean-Reversion
#
# HOW IT WORKS:
#   1. Every 1h bar, compute the session's Volume Profile (fair value range)
#   2. ENTRY: When price re-enters the value area after being outside
#      (= "acceptance_into_value" = AMT Rule 1 signal)
#      This means: price dipped below fair value, now recovering → BUY
#   3. EXIT: When price reaches the upper edge of value area (VAH)
#      This means: mean-reversion target hit → SELL
#   4. STOP: If price drops 3.5x ATR from entry → bail out
#   5. TAKE PROFIT: 1.5x the risk amount (risk/reward ratio)
#
# INDICATORS USED:
#   acceptance_into_value = bool: was price outside value, now inside?
#   above_value          = bool: is price above the value area high?
#   vp_vah               = float: Value Area High (upper fair value)
#   vp_val               = float: Value Area Low (lower fair value)
#   atr                  = float: Average True Range (volatility)
#
# BEST ON: 30min or 1h data, equities with clear session boundaries
# RESULTS: AAPL +168% (18 months, 1h, 5% risk, 3x lev)

schema_version: "2.0"
name: amt_dip_buyer_final
description: >
  AMT Rule 1 dip buyer. Buy when price re-enters fair value after dipping
  below (acceptance_into_value). Sell at upper edge of value (above_value).
  ATR stop + risk/reward take-profit. Best on 30min/1h intraday.

parameters:
  atr_stop_mult:
    type: float
    default: 3.5
    minimum: 2.0
    maximum: 5.0
    description: ATR multiplier for stop loss distance

timeframes:
  primary: 1h

indicators:
  - name: atr
    type: atr
    timeframe: primary
  - name: vp_vah
    type: vp_vah
    timeframe: primary
  - name: vp_val
    type: vp_val
    timeframe: primary
  - name: above_value
    type: above_value
    timeframe: primary
  - name: acceptance_into_value
    type: acceptance_into_value
    timeframe: primary

sides:
  # LONG: Buy dips below fair value, sell at upper edge
  long:
    entry:
      condition:
        all:
          - operator: is_true
            left: acceptance_into_value
    exit:
      condition:
        any:
          - operator: is_true
            left: above_value

risk:
  stop_loss:
    type: atr
    multiplier: "{{ atr_stop_mult }}"
  take_profit:
    type: risk_reward
    ratio: 1.5
